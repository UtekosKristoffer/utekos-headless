              - article "Produktbeskrivelse" [ref=e203]:
                - paragraph [ref=e208]:
                  - text: Tøff mot været, komfortabel for deg – Comfyrobe™ er den ultimate roben som forener teknisk funksjon med tidløst design. Det robuste HydroGuard™-ytterstoffet er vanntett og vindtett med tapede sømmer, konstruert for å stenge elementene ute. Samtidig sørger materialets pustende egenskaper for at fuktighet slipper ut, noe som forhindrer klamhet. Skapt for å holde deg varm, tørr og beskyttet i alle værforhold – enten det er på hytteterrassen, ved bobilen, etter isbading eller til hverdagslige ærend.
                  - text: Innsiden er fôret med SherpaCore™ – et tykt, teknisk lag av syntetisk lammeull som umiddelbart omslutter deg med varme og effektivt absorberer fukt fra kroppen. Den romslige hetten fungerer som en lun kappe mot vinden, og de dype, fôrede ytterlommene varmer raskt kalde hender. En solid toveis YKK®-glidelås gjør det enkelt å regulere temperaturen, mens splitten på baksiden sikrer full bevegelsesfrihet. Det rene designet med diskré farger gjør at den passer like godt på fjellet som i byen.
                  - text: Enten du sitter i båten en kjølig kveld, slapper av på campingen etter en lang dag, eller nyter morgenkaffen utendørs – Comfyrobe™ forbedrer opplevelsen og gjør at den kan vare lenger. Dette er en anvendelig følgesvenn som leverer kompromissløs varme og komfort – fra sjøen til fjellet, via bobilen og helt tilbake til ditt eget hjem.
                - button "Les mer" [ref=e210] [cursor=pointer]
