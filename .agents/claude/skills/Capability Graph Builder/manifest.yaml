name: capability-graph-builder
kind: skill
description: Builds a queryable capability graph from manifests, infers missing relationships with Codex, and validates compatibility consistency for orchestration planning.
inputs_schema:
  type: object
  required:
    - manifest_dir
    - output_path
  properties:
    manifest_dir:
      type: string
      description: Directory containing capability manifest.yaml files to ingest.
    output_path:
      type: string
      description: Destination file path for the generated capability-graph.json.
    validate_consistency:
      type: boolean
      description: Run Codex-powered checks for asymmetric, conflicting, and cyclic relationships.
      default: true
    infer_missing:
      type: boolean
      description: Use Codex analysis to infer unspecified compatibility edges.
      default: true
preconditions:
  - check: directory_exists(inputs.manifest_dir)
    description: Capability manifests must be available for ingestion.
    required: true
  - check: file_glob_exists(inputs.manifest_dir, '**/manifest.yaml')
    description: At least one manifest.yaml must be present to populate the graph.
    required: true
  - check: env_var_set('OPENAI_API_KEY')
    description: Codex access requires a configured OpenAI API key.
    required: true
  - check: tool_available('codex')
    description: Codex CLI must be installed to perform relationship inference.
    required: true
  - check: path_writable(inputs.output_path)
    description: Output location must be writable to persist the graph artifact.
    required: true
effects:
  - creates_capability_graph_json
  - adds_domain_index
  - adds_effect_index
  - updates_manifest_relationships
  - generates_consistency_report
domains:
  - knowledge-graph
  - ai
  - orchestration
  - validation
cost: medium
latency: slow
risk_level: low
side_effects:
  - makes_api_calls
  - modifies_files
  - emits_logs
idempotent: false
success_signal: capability_graph_written(inputs.output_path) && consistency_validation_passed()
failure_signals:
  - codex_inference_error
  - manifest_consistency_failure
  - output_write_failure
compatibility:
  requires:
    - manifest-generator
    - openai-integration
  composes_with:
    - skill-validator
    - orchestration-planner
    - capability-graph-visualizer
  enables:
    - orchestration-planner
    - capability-query-api
    - skill-validator
observability:
  logs:
    - capability_graph.node_count
    - capability_graph.edge_count
    - capability_graph.consistency_issues
  metrics:
    - codex.calls.count
    - codex.tokens.total
    - graph.builders.duration_ms
metadata:
  version: "1.0.0"
  author: AI Systems Team
  created_at: "2024-10-01T00:00:00Z"
  updated_at: "2025-02-18T00:00:00Z"
  tags:
    - capability-graph
    - codex
    - orchestration
  examples:
    - Build full capability knowledge base after manifest generation
    - Validate compatibility declarations before deploying orchestration planner
